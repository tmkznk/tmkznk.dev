<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 760" fill="none" role="img" aria-label="A winding green dashed route ending in a location marker.">
  <defs>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" />
    </filter>
    <filter id="glow-node" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="9" />
    </filter>
    <filter id="glow-pin" x="-160%" y="-160%" width="420%" height="420%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
    <!-- vertical fade: solid at the top (near the marker), transparent at the tail -->
    <linearGradient id="dash-fade" gradientUnits="userSpaceOnUse" x1="270" y1="150" x2="270" y2="752">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="1" />
      <stop offset="62%" stop-color="#4ade80" stop-opacity="1" />
      <stop offset="85%" stop-color="#4ade80" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="glow-fade" gradientUnits="userSpaceOnUse" x1="270" y1="150" x2="270" y2="752">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35" />
      <stop offset="62%" stop-color="#22c55e" stop-opacity="0.35" />
      <stop offset="85%" stop-color="#22c55e" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Route path (winding, shorter) -->
  <!-- soft glow underlay -->
  <path d="M300,150 C300,205 246,225 246,285 C246,350 336,368 336,430 C336,498 214,516 214,582 C214,640 250,668 244,752"
        stroke="url(#glow-fade)" stroke-width="6" stroke-linecap="round" filter="url(#glow-soft)" />
  <!-- dashed line -->
  <path d="M300,150 C300,205 246,225 246,285 C246,350 336,368 336,430 C336,498 214,516 214,582 C214,640 250,668 244,752"
        stroke="url(#dash-fade)" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="9 12" />

  <!-- Waypoint nodes: all identical size and glow -->
  <g>
    <circle cx="246" cy="285" r="14" fill="#22c55e" opacity="0.5" filter="url(#glow-node)" />
    <circle cx="246" cy="285" r="5" fill="#bbf7d0" />
  </g>
  <g>
    <circle cx="336" cy="430" r="14" fill="#22c55e" opacity="0.5" filter="url(#glow-node)" />
    <circle cx="336" cy="430" r="5" fill="#bbf7d0" />
  </g>
  <g>
    <circle cx="214" cy="582" r="14" fill="#22c55e" opacity="0.5" filter="url(#glow-node)" />
    <circle cx="214" cy="582" r="5" fill="#bbf7d0" />
  </g>

  <!-- Location marker (pin), larger with a stronger glow, tip at 300,150 -->
  <g transform="translate(300 150) scale(1.35)">
    <ellipse cx="0" cy="-34" rx="26" ry="26" fill="#22c55e" opacity="0.6" filter="url(#glow-pin)" />
    <path fill="#22c55e" fill-rule="evenodd"
          d="M0,0 C-9,-16 -16,-24 -16,-34 A16,16 0 1 1 16,-34 C16,-24 9,-16 0,0 Z
             M6,-34 A6,6 0 1 0 -6,-34 A6,6 0 1 0 6,-34 Z" />
  </g>
</svg>
